name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      JOOQ_DB_URL: jdbc:postgresql://localhost:5432/postgres
      JOOQ_DB_USER: postgres
      JOOQ_DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres -d postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Build backend
        run: ./gradlew clean build --info --stacktrace

      - name: Debug generated files on failure
        if: failure()
        run: |
          echo "=== module-db/build ==="
          ls -R ./module-db/build || true

          echo "=== generated-sources ==="
          ls -R ./module-db/build/generated-sources || true

          echo "=== Tables.java path ==="
          find ./module-db/build -name "Tables.java" || true

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with: 
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Lint frontend
        run: pnpm lint

      - name: Test frontend
        run: pnpm test