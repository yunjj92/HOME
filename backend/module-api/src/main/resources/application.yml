server:
  port: 8080
  servlet:
    context-path: /  # 기본값
  error:
    include-message: always # 에러 발생 시 메시지 포함 (개발 편의성)

spring:
  mvc:
    pathmatch:
      matching-strategy: path_pattern_parser
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jooq:
    sql-dialect: POSTGRES # Specifies the jOOQ SQL dialect
  flyway:
    enabled: true
    baseline-on-migrate: true
springdoc:
  default-produces-media-type: application/json
  api-docs:
    version: OPENAPI_3_0

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-millis: 3600000        # 1 hour
  refresh-token-validity-in-millis: 1209600000  # 14 days

webauthn:
  relying-party:
    id: localhost
    name: HomeProject
    origins: http://localhost:3000, http://localhost:8080, http://localhost:5173
